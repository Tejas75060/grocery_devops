apiVersion: v1
kind: Secret
metadata:
  name: grocery-secret
  namespace: grocery
type: Opaque
# Demo values. In production these are injected by Vault (Step 7), not committed.
stringData:
  DB_USER: "grocery"
  DB_PASSWORD: "grocery"
  # Full URL assembled here so the app needs only DATABASE_URL.
  DATABASE_URL: "postgresql://grocery:grocery@grocery-db:5432/grocery"
