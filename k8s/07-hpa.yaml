# Horizontal Pod Autoscaler — scales the app 2..10 replicas on CPU/memory.
# Requires metrics-server (installed by k8s/scripts/up.sh).
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: grocery-app-hpa
  namespace: grocery
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: grocery-app
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 120
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
