apiVersion: apps/v1
kind: Deployment
metadata:
  name: grocery-app
  namespace: grocery
  labels:
    app: grocery-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: grocery-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: grocery-app
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: grocery-app
          # Loaded into kind via `kind load docker-image grocery-app:local`.
          image: grocery-app:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: grocery-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: grocery-secret
                  key: DATABASE_URL
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
