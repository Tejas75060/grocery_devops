# kind cluster with port mappings so the ingress controller is reachable
# from the host on :80/:443.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: grocery
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
  - role: worker
