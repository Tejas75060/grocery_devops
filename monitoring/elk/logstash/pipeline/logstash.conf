input {
  beats { port => 5044 }
  tcp { port => 5000 codec => json_lines }
}

filter {
  # The app logs structured JSON; parse the message into fields.
  if [message] =~ /^\{/ {
    json { source => "message" target => "app" skip_on_invalid_json => true }
  }
  # Filebeat tags Docker metadata under [container]; keep a tidy service field.
  if [container][name] {
    mutate { add_field => { "service" => "%{[container][name]}" } }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "grocery-logs-%{+YYYY.MM.dd}"
  }
  stdout { codec => rubydebug }
}
