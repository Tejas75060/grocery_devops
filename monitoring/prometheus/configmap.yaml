apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      - /etc/prometheus/rules/*.yml

    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      # Scrape the grocery app pods that carry prometheus.io/scrape annotations.
      - job_name: 'grocery-app'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ['grocery']
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
  rules.yml: |
    groups:
      - name: grocery-alerts
        rules:
          - alert: GroceryAppDown
            expr: up{job="grocery-app"} == 0
            for: 1m
            labels: { severity: critical }
            annotations:
              summary: "Grocery app target down"
          - alert: HighRequestLatency
            expr: histogram_quantile(0.95, sum(rate(grocery_http_request_duration_seconds_bucket[5m])) by (le)) > 1
            for: 5m
            labels: { severity: warning }
            annotations:
              summary: "p95 request latency > 1s"
