apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: monitoring
data:
  grocery.json: |
    {
      "title": "Grocery Delivery Platform",
      "uid": "grocery-overview",
      "schemaVersion": 39,
      "timezone": "browser",
      "refresh": "10s",
      "time": { "from": "now-30m", "to": "now" },
      "panels": [
        {
          "type": "stat", "title": "Orders placed (total)",
          "gridPos": { "h": 5, "w": 6, "x": 0, "y": 0 },
          "targets": [{ "expr": "sum(grocery_orders_placed_total)" }]
        },
        {
          "type": "stat", "title": "Orders delivered (total)",
          "gridPos": { "h": 5, "w": 6, "x": 6, "y": 0 },
          "targets": [{ "expr": "sum(grocery_orders_delivered_total)" }]
        },
        {
          "type": "gauge", "title": "Active orders",
          "gridPos": { "h": 5, "w": 6, "x": 12, "y": 0 },
          "targets": [{ "expr": "sum(grocery_active_orders)" }]
        },
        {
          "type": "stat", "title": "App targets UP",
          "gridPos": { "h": 5, "w": 6, "x": 18, "y": 0 },
          "targets": [{ "expr": "sum(up{job=\"grocery-app\"})" }]
        },
        {
          "type": "timeseries", "title": "Request rate (req/s) by path",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 5 },
          "targets": [{
            "expr": "sum(rate(grocery_http_requests_total[1m])) by (path)",
            "legendFormat": "{{path}}"
          }]
        },
        {
          "type": "timeseries", "title": "p95 latency (s)",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 5 },
          "targets": [{
            "expr": "histogram_quantile(0.95, sum(rate(grocery_http_request_duration_seconds_bucket[5m])) by (le, path))",
            "legendFormat": "{{path}}"
          }]
        },
        {
          "type": "timeseries", "title": "HTTP responses by status",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 13 },
          "targets": [{
            "expr": "sum(rate(grocery_http_requests_total[1m])) by (status)",
            "legendFormat": "{{status}}"
          }]
        }
      ]
    }
